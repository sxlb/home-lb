services:
  app:
    build: .
    container_name: home-sxlb
    ports:
      - "3001:3001"
    volumes:
      - ./data/database:/app/database
      - ./data/logs:/app/logs
    environment:
      - PORT=3001
      - STATIC_PATH=/app
      - JWT_SECRET=${JWT_SECRET:-changeme-in-production}
      - LOG_LEVEL=info
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:3001/api/system/health"]
      interval: 30s
      timeout: 5s
      retries: 3
