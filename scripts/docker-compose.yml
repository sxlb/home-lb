# Home-SXLB Docker 部署配置

services:
  # 后端服务
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: home-sxlb-backend
    ports:
      - "3001:3001"
    volumes:
      - ./data:/app/data
      - ./data/logs:/app/logs
      - ./data/database:/app/database
    environment:
      - NODE_ENV=production
      - PORT=3001
      - JWT_SECRET=${JWT_SECRET:-changeme-in-production}
      - ADMIN_USERNAME=${ADMIN_USERNAME:-admin}
      - ADMIN_PASSWORD=${ADMIN_PASSWORD:-admin123}
      - LOG_LEVEL=info
      - DB_PATH=./database/home-sxlb.db
    restart: unless-stopped
    networks:
      - home-sxlb-network
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3001/api/system/health"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: home-sxlb-nginx
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./scripts/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./data/certs:/etc/nginx/certs:ro
    depends_on:
      - backend
    restart: unless-stopped
    networks:
      - home-sxlb-network

networks:
  home-sxlb-network:
    driver: bridge
